<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tareas Semanales: Majo e Ivanna</title>

    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%239333ea'/%3E%3Ctext y='78' x='10' font-family='Arial' font-size='70'%3E⭐%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tareas">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: #fdf4ff; margin: 0; padding: 0; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .card-3d { background: white; border-radius: 2.5rem; border: 4px solid #f1f5f9; box-shadow: 0 10px 0 0 #e2e8f0; transition: all 0.2s ease; }
        .card-3d:hover { transform: translateY(-4px); box-shadow: 0 14px 0 0 #e2e8f0; }
        .btn-3d { border-radius: 1.5rem; font-weight: 900; transition: all 0.1s ease; position: relative; top: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-3d:active { top: 6px; box-shadow: 0 2px 0 0 currentColor !important; }
        .task-row { transition: all 0.3s ease; border-left: 10px solid transparent; }
        .task-completed { background: #f0fdf4 !important; border-left-color: #22c55e !important; opacity: 0.8; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-bounce-subtle { animation: bounce-subtle 2s infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        window.USER_FIREBASE_CONFIG = {
            apiKey: "AIzaSyCgh9G37P75Z1L53JZzI2jjL4GBgcV74Pk",
            authDomain: "ceteskids.firebaseapp.com",
            projectId: "ceteskids",
            storageBucket: "ceteskids.firebasestorage.app",
            messagingSenderId: "819262734652",
            appId: "1:819262734652:web:c385b1479ea83448975e39"
        };
        window.USER_APP_ID = "tareas-majo-ivanna-2024";
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection, query };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SafeIcon = ({ name, color, size = 24, className = "" }) => {
            const Lucide = window.lucide;
            if (!Lucide || !Lucide[name]) return null;
            const Component = Lucide[name];
            return <Component color={color} size={size} className={className} />;
        };

        const App = () => {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [profiles, setProfiles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeProfileId, setActiveProfileId] = useState(null);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [newTaskName, setNewTaskName] = useState('');
            const [newTaskReward, setNewTaskReward] = useState('');

            const appId = window.USER_APP_ID;

            useEffect(() => {
                const init = async () => {
                    const { initializeApp, getAuth, getFirestore, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                    try {
                        const config = window.USER_FIREBASE_CONFIG;
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, setUser);
                    } catch (e) { console.error(e); setLoading(false); }
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const { collection, query, onSnapshot, doc, setDoc } = window.FirebaseSDK;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'task_profiles'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const loaded = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    if (loaded.length === 0) {
                        const initialData = [
                            { id: 'majo', name: 'Majo', emoji: '🎨', tasks: [{ id: '1', text: 'Hacer la cama', reward: 5, completed: false }] },
                            { id: 'ivanna', name: 'Ivanna', emoji: '🦄', tasks: [{ id: '1', text: 'Hacer la cama', reward: 5, completed: false }] }
                        ];
                        initialData.forEach(p => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'task_profiles', p.id), p));
                    } else {
                        setProfiles(loaded);
                        setActiveProfileId(prev => prev || loaded[0].id);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user, db]);

            const activeProfile = profiles.find(p => p.id === activeProfileId) || profiles[0] || {};

            const saveProfile = async (data) => {
                const { doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'task_profiles', activeProfile.id), data);
            };

            const toggleTask = async (taskId) => {
                const updatedTasks = activeProfile.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
                await saveProfile({ ...activeProfile, tasks: updatedTasks });
            };

            const addTask = async () => {
                if (!newTaskName || !newTaskReward) return;
                const newTask = { id: Date.now().toString(), text: newTaskName, reward: parseFloat(newTaskReward), completed: false };
                await saveProfile({ ...activeProfile, tasks: [...(activeProfile.tasks || []), newTask] });
                setNewTaskName(''); setNewTaskReward('');
            };

            const deleteTask = async (taskId) => {
                const updatedTasks = activeProfile.tasks.filter(t => t.id !== taskId);
                await saveProfile({ ...activeProfile, tasks: updatedTasks });
            };

            const resetWeek = async () => {
                const updatedTasks = activeProfile.tasks.map(t => ({ ...t, completed: false }));
                await saveProfile({ ...activeProfile, tasks: updatedTasks });
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-2xl text-purple-600 animate-pulse uppercase">CARGANDO TAREAS...</div>;

            const earnings = activeProfile.tasks?.filter(t => t.completed).reduce((sum, t) => sum + t.reward, 0) || 0;

            return (
                <div className="min-h-screen p-4 md:p-8 fade-in">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-[2.5rem] shadow-sm border-4 border-white">
                            <div className="flex gap-4">
                                {profiles.map(p => (
                                    <button key={p.id} onClick={() => setActiveProfileId(p.id)} className={`px-8 py-3 rounded-2xl font-black text-lg transition-all btn-3d ${activeProfileId === p.id ? 'bg-purple-600 text-white shadow-xl' : 'bg-slate-50 text-slate-400'}`}>
                                        {p.emoji} {p.name}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setShowAdminModal(true)} className="p-4 bg-slate-800 text-white rounded-3xl btn-3d shadow-[0_6px_0_0_#000]"><SafeIcon name="ShieldCheck" /></button>
                        </div>

                        <div className="card-3d p-12 mb-10 bg-gradient-to-br from-purple-500 to-indigo-600 text-white border-none shadow-[0_10px_0_0_#4c1d95] relative overflow-hidden">
                            <h1 className="text-5xl font-black mb-6 flex items-center gap-6 italic tracking-tighter"><span className="animate-bounce-subtle">{activeProfile.emoji}</span> ¡Hola, {activeProfile.name}!</h1>
                            <div className="bg-white/20 p-8 rounded-[2.5rem] flex justify-between items-center font-black text-4xl italic tracking-tighter leading-none">
                                <span className="uppercase tracking-widest text-sm opacity-80">Ganado esta semana:</span>
                                <span>${earnings}</span>
                            </div>
                        </div>

                        <div className="space-y-6">
                            {(activeProfile.tasks || []).map(task => (
                                <div key={task.id} onClick={() => toggleTask(task.id)} className={`card-3d p-8 flex justify-between items-center cursor-pointer task-row ${task.completed ? 'task-completed' : ''}`}>
                                    <div className="flex items-center gap-6">
                                        <div className={`w-12 h-12 rounded-full border-4 flex items-center justify-center ${task.completed ? 'bg-green-500 border-green-200 text-white shadow-md' : 'bg-slate-100 border-slate-200 text-slate-200'}`}>
                                            {task.completed && <SafeIcon name="Check" size={28} />}
                                        </div>
                                        <span className={`text-3xl font-bold italic tracking-tighter ${task.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>{task.text}</span>
                                    </div>
                                    <div className="bg-yellow-100 text-yellow-700 px-6 py-3 rounded-2xl font-black text-2xl tracking-tighter shadow-sm">+${task.reward}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showAdminModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[3rem] p-10 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[90vh]">
                                <h2 className="text-3xl font-black mb-8 text-indigo-600 uppercase tracking-tighter italic text-center">Panel Papá</h2>
                                <div className="bg-slate-50 p-8 rounded-[2.5rem] border-4 border-slate-100 mb-8 text-center">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Nueva Tarea</h3>
                                    <input type="text" value={newTaskName} onChange={e=>setNewTaskName(e.target.value)} placeholder="¿Qué hay que hacer?" className="w-full p-4 mb-4 rounded-2xl border-2 font-bold outline-none text-center" />
                                    <input type="number" value={newTaskReward} onChange={e=>setNewTaskReward(e.target.value)} placeholder="Recompensa $" className="w-full p-4 mb-6 rounded-2xl border-2 font-bold outline-none text-center" />
                                    <button onClick={addTask} className="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-xl btn-3d shadow-[0_8px_0_0_#4338ca] uppercase">Añadir Tarea</button>
                                </div>
                                <div className="space-y-3 mb-8 pr-2 custom-scrollbar">
                                    {activeProfile.tasks?.map(t => (
                                        <div key={t.id} className="flex justify-between items-center p-4 bg-white border-b-2">
                                            <span className="font-bold text-slate-600 italic">{t.text} (${t.reward})</span>
                                            <button onClick={()=>deleteTask(t.id)} className="text-red-400 p-2 hover:bg-red-50 rounded-full transition-all"><SafeIcon name="Trash2" size={20}/></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={resetWeek} className="w-full py-5 mb-4 border-4 border-indigo-100 text-indigo-600 font-black rounded-2xl uppercase tracking-widest text-sm">Reiniciar Semana</button>
                                <button onClick={()=>setShowAdminModal(false)} className="w-full text-slate-400 font-black uppercase tracking-widest text-xs text-center">Cerrar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
